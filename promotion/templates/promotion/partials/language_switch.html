{% load i18n %}
<div class="language-switch" role="group" aria-label="{% trans "Language selector" %}">
    <form action="{% url 'set_language' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        {% for code, label in languages %}
            <button type="submit"
                    name="language"
                    value="{{ code }}"
                    class="{% if code == language_code %}is-active{% endif %}"
                    aria-pressed="{% if code == language_code %}true{% else %}false{% endif %}">
                {{ label }}
            </button>
        {% endfor %}
    </form>
</div>
